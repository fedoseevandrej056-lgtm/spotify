name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS Release
        run: flutter build ios --release --no-codesign --verbose

      - name: Create IPA
        run: |
          # Find the built app
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found in build/ios"
            find build -name "*.app" -type d 2>/dev/null || echo "No .app files found"
            exit 1
          fi

          echo "✅ Found Runner.app at: $APP_PATH"

          # Create IPA structure
          mkdir -p build/ios/Payload
          cp -r "$APP_PATH" build/ios/Payload/

          # Create IPA
          cd build/ios
          zip -r spotify_music_player.ipa Payload/

          echo "✅ IPA created: $(ls -lh spotify_music_player.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/spotify_music_player.ipa
          retention-days: 7

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/spotify_music_player.ipa
          tag_name: ios-build-${{ github.run_number }}
          name: iOS IPA Build #${{ github.run_number }}
          body: |
            iOS IPA Build #${{ github.run_number }}

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            Download `spotify_music_player.ipa` to install on iOS devices.
          draft: false
          prerelease: false
