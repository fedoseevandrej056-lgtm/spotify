name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Prepare iOS
        run: |
          flutter clean
          flutter create . --platforms=ios
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q spotify_music_player.ipa Payload/
      
      - name: Upload IPA to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/spotify_music_player.ipa
          retention-days: 30
      
      - name: Upload app to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
      
      - name: Create Release and Upload IPA
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/iphoneos/spotify_music_player.ipa
          tag_name: ios-build-${{ github.run_number }}
          body: |
            iOS IPA Build #${{ github.run_number }}
            
            **Build Date:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            
            Download `spotify_music_player.ipa` to install on iOS devices.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
